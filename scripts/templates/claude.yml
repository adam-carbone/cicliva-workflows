name: Claude Coding Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # NOTE: Do NOT filter out bot comments here. The Issue Orchestrator triggers this agent
    # by posting '@claude' on an issue. Bot access is controlled by allowed_bots in the
    # reusable workflow. See cicliva-workflows/claude-agent.yml.
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    uses: {{WORKFLOW_REPO}}/.github/workflows/claude-agent.yml@main
    with:
      stack: {{STACK}}
      platform_repo: {{WORKFLOW_REPO}}
      repo_instructions: |
        {{REPO_INSTRUCTIONS}}
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      domiva_agent_app_id: ${{ secrets.AGENT_APP_ID }}
      domiva_agent_private_key: ${{ secrets.AGENT_PRIVATE_KEY }}
      cicliva_learnings_api_key: ${{ secrets.CICLIVA_LEARNINGS_API_KEY }}
