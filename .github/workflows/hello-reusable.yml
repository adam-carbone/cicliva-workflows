name: Hello Reusable

on:
  workflow_call:
    inputs:
      pr_number:
        required: false
        type: string
    secrets:
      anthropic_api_key:
        required: false
      domiva_agent_app_id:
        required: false
      domiva_agent_private_key:
        required: false

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Reusable workflow called with pr_number=${{ inputs.pr_number }}"
