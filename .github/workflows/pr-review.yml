name: PR Review

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      repo:
        required: true
        type: string
    secrets:
      anthropic_api_key:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          prompt: |
            Review PR #${{ inputs.pr_number }} in ${{ inputs.repo }}.

            ## Step 0: Gather context
            1. Run: gh pr diff ${{ inputs.pr_number }} --repo ${{ inputs.repo }}
            2. Run: gh pr view ${{ inputs.pr_number }} --repo ${{ inputs.repo }} --json title,body,files
            3. Read CLAUDE.md using the Read tool (it is checked out at CLAUDE.md in the workspace)

            ## Step 1: Categorize every finding as BLOCKING or NIT

            **BLOCKING** — the PR Fix Agent will fix these automatically. Only flag as BLOCKING when:
            - Incorrect behavior (does not match the issue spec)
            - Logic flaw or bug that will cause failures in production
            - Security vulnerability
            - Missing test coverage for a behavior change
            - Hard violation of CLAUDE.md conventions

            **NIT** — informational only, never auto-fixed. Use for:
            - Style preferences or minor naming suggestions
            - Optional refactors that do not affect correctness
            - Nice-to-have improvements

            ## Step 2: Post a PR comment

            Run this command (replace the body with your actual review):
            gh pr comment ${{ inputs.pr_number }} --repo ${{ inputs.repo }} --body "<your review>"

            The comment body MUST follow this exact markdown structure — no prose before or after:

            ## PR Review

            ### BLOCKING
            - `path/to/file:42` — description of the problem and exactly what to fix
            (write "None" if there are no blocking issues)

            ### NITS
            - `path/to/file:10` — suggestion
            (write "None" if there are no nits)

            ### Summary
            One or two sentences summarising the overall state of the PR.

            ## Step 3: Submit a formal GitHub review

            Run exactly one of these — do not skip this step:

            If there are BLOCKING issues:
            gh api repos/${{ inputs.repo }}/pulls/${{ inputs.pr_number }}/reviews --method POST --field event=CHANGES_REQUESTED --field body="Blocking issues found — see PR Review comment above."

            If there are NO blocking issues:
            gh api repos/${{ inputs.repo }}/pulls/${{ inputs.pr_number }}/reviews --method POST --field event=APPROVE --field body="No blocking issues. Ready for human review."
          claude_args: --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api repos/*/pulls/*/reviews:*),Read,Glob,Grep"
