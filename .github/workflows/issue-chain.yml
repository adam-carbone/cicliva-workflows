name: Issue Orchestrator

on:
  workflow_call:
    secrets:
      domiva_agent_app_id:
        required: true
      domiva_agent_private_key:
        required: true

jobs:
  chain:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      id-token: write
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.domiva_agent_app_id }}
          private-key: ${{ secrets.domiva_agent_private_key }}
          owner: Domiva-Life

      - name: Find closed issue and trigger next
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          CLOSED_ISSUE=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+' | head -1)
          if [ -z "$CLOSED_ISSUE" ]; then
            echo "No linked issue found in PR body — nothing to chain."
            exit 0
          fi
          echo "PR closed issue #$CLOSED_ISSUE"
          ISSUE_BODY=$(gh api repos/$REPO/issues/$CLOSED_ISSUE --jq '.body')
          NEXT_ISSUE=$(echo "$ISSUE_BODY" | grep -oE '\*\*Next:\*\* #[0-9]+' | grep -oE '[0-9]+' | head -1)
          if [ -z "$NEXT_ISSUE" ]; then
            # No explicit Next: — fall back to the lowest-numbered open issue.
            # This keeps the chain moving without requiring every issue to declare its successor.
            echo "Issue #$CLOSED_ISSUE has no Next: reference — looking for next open issue."
            NEXT_ISSUE=$(gh issue list --repo $REPO --state open --json number --jq '[.[].number] | sort | .[0]')
            if [ -z "$NEXT_ISSUE" ] || [ "$NEXT_ISSUE" = "null" ]; then
              echo "No open issues remain — chain complete."
              exit 0
            fi
            echo "No explicit Next: found — defaulting to lowest open issue #$NEXT_ISSUE"
          fi
          echo "Triggering next issue: #$NEXT_ISSUE"
          gh api repos/$REPO/issues/$NEXT_ISSUE/comments \
            --method POST \
            --field body="Issue #$CLOSED_ISSUE has been merged. @claude please implement this issue."
