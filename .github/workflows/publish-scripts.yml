name: Publish Public Scripts

# Publishes scripts that must be publicly reachable before a customer has a token.
# Only runs in the cicliva org — no-op everywhere else.
#
# Required secrets (set in cicliva org or cicliva-workflows repo):
#   CICLIVA_GCS_SA_KEY        — JSON service account key with Storage Object Admin
#                               on the scripts bucket
#   CICLIVA_SCRIPTS_BUCKET    — bucket name only, e.g. cicliva-public-scripts

on:
  push:
    branches: [main]
    paths:
      - scripts/cicliva-setup.sh
      - scripts/agent-workflows.sh
      - scripts/templates/**

jobs:
  publish:
    if: github.repository_owner == 'cicliva'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.CICLIVA_WIF_PROVIDER }}
          service_account: ${{ secrets.CICLIVA_WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Publish scripts
        env:
          BUCKET: ${{ secrets.CICLIVA_SCRIPTS_BUCKET }}
        run: |
          gsutil -h "Cache-Control:no-cache" cp scripts/cicliva-setup.sh   gs://$BUCKET/cicliva-setup.sh
          gsutil -h "Cache-Control:no-cache" cp scripts/agent-workflows.sh  gs://$BUCKET/agent-workflows.sh
          gsutil -h "Cache-Control:no-cache" cp -r scripts/templates/        gs://$BUCKET/templates/
          echo "Published:"
          echo "  https://storage.googleapis.com/$BUCKET/cicliva-setup.sh"
          echo "  https://storage.googleapis.com/$BUCKET/agent-workflows.sh"
          echo "  https://storage.googleapis.com/$BUCKET/templates/"
